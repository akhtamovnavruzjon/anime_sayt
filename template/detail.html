{% extends 'base.html' %}

{% block contend %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card anime-card">

                <img src="{{ tavsif.image.url }}"
                     class="card-img-top"
                     alt="{{ tavsif.title }}">

                <div class="card-body">

                    <h2 class="card-title">{{ tavsif.title }}</h2>

                    <p class="text-secondary">Janr: {{ tavsif.get_genre_display }}</p>

                    <p class="mt-3" style="color:#ccc; line-height:1.7;">
                        {{ tavsif.description }}
                    </p>

                    <a href="{% url 'home' %}" class="btn btn-anime mt-3">
                        ⬅ Orqaga
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock contend %}
