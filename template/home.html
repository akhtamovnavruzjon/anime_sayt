{% extends 'base.html' %}

{% block contend %}

<div class="container mt-5">

    <div class="row">

        {% for anime in animes %}

        <div class="col-lg-4 col-md-6 mb-4">

            <div class="card anime-card h-100">

                <img src="{{ anime.image.url }}"
                     class="card-img-top"
                     alt="{{ anime.title }}">

                <div class="card-body">

                    <h4 class="card-title">

                        {{ anime.title }}

                    </h4>

                    <a href="{% url 'detail' anime.pk %}"
                       class="btn btn-anime mt-3">

                        Batafsil

                    </a>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="text-center mt-5">

            <h2>😢</h2>

            <h4>Hozircha animelar mavjud emas.</h4>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock contend %}
