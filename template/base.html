<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime World</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
        }

        .navbar{
            background:#111827;
            box-shadow:0 3px 15px rgba(0,0,0,.4);
        }

        .logo{
            color:#ff3b3b;
            font-size:30px;
            font-weight:bold;
            text-decoration:none;
        }

        .hero{
            background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.7)),
            url("https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1600");
            background-size:cover;
            background-position:center;
            height:280px;

            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        .hero h1{
            font-size:50px;
            font-weight:bold;
        }

        .hero p{
            color:#ddd;
            font-size:20px;
        }

        .anime-card{
            background:#1e293b;
            border:none;
            border-radius:20px;
            overflow:hidden;
            transition:.4s;
            box-shadow:0 10px 25px rgba(0,0,0,.4);
        }

        .anime-card:hover{
            transform:translateY(-10px);
            box-shadow:0 20px 40px rgba(255,0,85,.4);
        }

        .anime-card img{
            height:320px;
            object-fit:cover;
        }

        .card-body{
            text-align:center;
        }

        .card-title{
            color:#fff;
            font-size:22px;
            font-weight:bold;
        }

        .btn-anime{
            background:#ff004f;
            color:white;
            border:none;
            border-radius:30px;
            padding:10px 25px;
        }

        .btn-anime:hover{
            background:#ff2c70;
            color:white;
        }

        footer{
            background:#111827;
            margin-top:70px;
            padding:30px;
            text-align:center;
            color:#bbb;
        }

    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a href="#" class="logo">
            🎌 Anime World
        </a>

        <form method="GET" action="{% url 'home' %}" class="d-flex">
            <input class="form-control me-2"
                   type="text"
                   name="q"
                   placeholder="Anime qidirish...">

            <button class="btn btn-danger">
                Qidirish
            </button>

        </form>

    </div>
</nav>

<section class="hero">

    <div>

        <h1>Anime Olamiga Xush Kelibsiz</h1>

        <p>Eng mashhur animelarni tomosha qiling</p>

    </div>

</section>

        {% block contend %}

        {% endblock contend %}

<footer>

    <h5>Anime World © 2026</h5>

    <p>Barcha huquqlar himoyalangan.</p>

</footer>

</body>
</html>
